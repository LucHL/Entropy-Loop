name: EIP_Mirroring

env:
    MIRROR_URL: "git@github.com:EpitechPromo2027/G-EIP-600-STG-6-1-eip-luc.helmlinger.git"

on:
    push:
        branches-ignore:
            - 'ga-ignore-*'
    pull_request:
        branches-ignore:
            - 'ga-ignore-*'

jobs:
    setup:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                fetch-depth: 0

    push_to_mirror:
        runs-on: ubuntu-latest
        needs: setup
        steps:
            - name: Checkout
              uses: actions/checkout@v3
              with:
                fetch-depth: 0
            - name: Mirroring repository
              uses: pixta-dev/repository-mirroring-action@v1
              with:
                target_repository_url: ${{ env.MIRROR_URL }}
                ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY }}